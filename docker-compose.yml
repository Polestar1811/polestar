services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: teaagent
      POSTGRES_PASSWORD: teaagent
      POSTGRES_DB: teaagent
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

  chroma:
    image: chromadb/chroma:latest
    ports:
      - "8001:8000"
    volumes:
      - chroma_data:/chroma/chroma

  backend:
    build: ./backend
    env_file: .env.example
    environment:
      DATABASE_URL: postgresql+psycopg://teaagent:teaagent@postgres:5432/teaagent
    ports:
      - "8000:8000"
    depends_on:
      - postgres
      - redis
      - chroma

  frontend:
    build: ./frontend
    environment:
      NEXT_PUBLIC_API_BASE_URL: http://localhost:8000
    ports:
      - "3000:3000"
    depends_on:
      - backend

volumes:
  postgres_data:
  chroma_data:
